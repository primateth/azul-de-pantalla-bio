<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bibliografía — Azul de Pantalla</title>

<style>

body{
font-family: Georgia, serif;
background:#f4f4f4;
margin:0;
padding:0;
color:#111;
}

header{
background:#0a1a2f;
color:white;
padding:30px;
}

header h1{
margin:0;
font-size:28px;
}

.manifesto{
padding:25px;
background:white;
font-size:16px;
line-height:1.6;
border-bottom:1px solid #ddd;
}

.controls{
padding:20px;
background:#fafafa;
border-bottom:1px solid #ddd;
}

input{
padding:8px;
font-size:14px;
width:250px;
}

select{
padding:8px;
font-size:14px;
}

#content{
padding:30px;
max-width:900px;
margin:auto;
}

.ref{
margin-bottom:25px;
padding-bottom:15px;
border-bottom:1px solid #eee;
}

.ref-title{
font-weight:bold;
}

.links a{
display:inline-block;
margin-right:10px;
font-size:12px;
background:#eaeaea;
padding:4px 8px;
text-decoration:none;
color:#333;
border-radius:4px;
}

footer{
margin-top:40px;
padding:30px;
background:#111;
color:white;
font-size:13px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>Bibliografía — Azul de Pantalla</h1>

</header>

<div class="manifesto">

Este libro no busca adeptos.<br>
No teme a la máquina que calcula.<br>
Teme al humano que abdica.<br>
Nadie gobierna lo que no puede apagar.<br>
Precio para adultos.

</div>

<div class="controls">

<input id="search" placeholder="Buscar autor o obra">

<select id="jumpSelect">
<option value="">Ir a referencia</option>
</select>

</div>

<div id="content"></div>

<footer>

La bibliografía, incompleta y digital, es superior al libro.<br>
© M. MÜLLER

</footer>

<script>

let bibliography = [];

function isLinkLine(line){

return /^(Link|URL|Fuente|Editorial|Gutenberg|PDF|Archivo)\s*:/i.test(line);

}

function extractTypedLinks(line){

let match = line.match(/^([^:]+):\s*(.*)$/);

if(!match) return [];

let type = match[1].toLowerCase();
let rest = match[2];

let urls = rest.match(/https?:\/\/\S+/g) || [];

return urls.map(url => ({

type:type,
url:url

}));

}

function parseBib(text){

let lines = text.split("\n");

let currentAuthor = "";
let lastItem = null;

for(let line of lines){

line=line.trim();

if(!line) continue;

if(!line.startsWith("REF-") && !line.includes(".")){

currentAuthor=line;
continue;

}

if(line.startsWith("REF-")){

let title=line;

let obj={

author:currentAuthor,
title:title,
links:[]

};

bibliography.push(obj);
lastItem=obj;

continue;

}

if(isLinkLine(line) && lastItem){

lastItem.links.push(...extractTypedLinks(line));
continue;

}

}

}

function prettyLinkLabel(type){

type=type.toLowerCase();

if(type==="fuente") return "fuente";
if(type==="editorial") return "editorial";
if(type==="gutenberg") return "leer";
if(type==="pdf") return "pdf";
if(type==="archivo") return "archivo";

return "link";

}

function render(){

let content=document.getElementById("content");
content.innerHTML="";

for(let item of bibliography){

let div=document.createElement("div");
div.className="ref";

let links="";

for(let link of item.links){

links+=`<a href="${link.url}" target="_blank">${prettyLinkLabel(link.type)}</a>`;

}

div.innerHTML=`

<div class="ref-title">${item.title}</div>
<div>${item.author}</div>
<div class="links">${links}</div>

`;

content.appendChild(div);

}

}

function populateSelect(){

let select=document.getElementById("jumpSelect");

bibliography.forEach((item,i)=>{

let opt=document.createElement("option");
opt.value=i;
opt.text=item.title;

select.appendChild(opt);

});

}

function setupSearch(){

let search=document.getElementById("search");

search.addEventListener("input",()=>{

let q=search.value.toLowerCase();

let filtered=bibliography.filter(b=>

b.title.toLowerCase().includes(q) ||
b.author.toLowerCase().includes(q)

);

renderFiltered(filtered);

});

}

function renderFiltered(list){

let content=document.getElementById("content");
content.innerHTML="";

list.forEach(item=>{

let links="";

for(let link of item.links){

links+=`<a href="${link.url}" target="_blank">${prettyLinkLabel(link.type)}</a>`;

}

let div=document.createElement("div");
div.className="ref";

div.innerHTML=`

<div class="ref-title">${item.title}</div>
<div>${item.author}</div>
<div class="links">${links}</div>

`;

content.appendChild(div);

});

}

fetch("bibliografia.txt")
.then(r=>r.text())
.then(text=>{

parseBib(text);
render();
populateSelect();
setupSearch();

});

</script>

</body>
</html>
